name: Weekly Privacy Policy Update

on:
  schedule:
    # Every Monday at 02:00 UTC
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  update-and-build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./prisma/dev.db
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
      DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
      NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
      PREFLIGHT_SOFT_FAIL: '1'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: |
          echo "[1/8] Installing dependencies..."
          pnpm install --frozen-lockfile
          echo "Dependencies installed."

      - name: Prepare database with Prisma
        run: |
          echo "[2/8] Running Prisma generate..."
          pnpm prisma:generate
          echo "Running Prisma db push..."
          pnpm exec prisma db push
          echo "Prisma setup finished."

      - name: Run weekly update pipeline
        run: |
          echo "[3/8] Executing scripts/runUpdate.ts..."
          pnpm run update:policies
          echo "Update pipeline finished."

      - name: Run preflight report
        run: |
          echo "[4/8] Running preflight checks..."
          pnpm preflight || true
          echo "Preflight checks completed."

      - name: Build Next.js site
        run: |
          echo "[5/8] Building static/SSG Next.js site..."
          pnpm build
          echo "Build completed."

      - name: Detect generated snapshot changes
        id: snapshot_changes
        run: |
          echo "[6/8] Detecting snapshot changes..."
          if git diff --quiet -- web/lib/generated; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No snapshot changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Snapshot changes detected."
          fi

      - name: Commit and push snapshot updates
        if: steps.snapshot_changes.outputs.changed == 'true'
        run: |
          echo "[7/8] Committing generated snapshot changes..."
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/lib/generated
          git commit -m "chore(data): weekly snapshot update"
          git push
          echo "Snapshot changes committed and pushed."

      - name: Skip commit when no changes
        if: steps.snapshot_changes.outputs.changed != 'true'
        run: |
          echo "[7/8] No snapshot changes. Skipping commit step."

      - name: Final workflow summary
        run: |
          echo "[8/8] Weekly update workflow completed successfully."
          echo "Includes: install, Prisma, update pipeline, preflight report, build, and optional snapshot commit."
