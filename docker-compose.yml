services:
  db:
    image: postgres:16-alpine
    container_name: ppa-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-privacy_policy_archive}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-privacy_policy_archive}"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - app_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ppa-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-privacy_policy_archive}
      APP_ENV: ${APP_ENV:-development}
      APP_NAME: ${APP_NAME:-privacy-policy-archive-api}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://127.0.0.1}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin@123}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-change-me}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret}
      JWT_EXPIRE_SECONDS: ${JWT_EXPIRE_SECONDS:-43200}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      APK_MAX_UPLOAD_MB: ${APK_MAX_UPLOAD_MB:-300}
      SEED_SAMPLE_DATA: ${SEED_SAMPLE_DATA:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_SENDER: ${SMTP_SENDER:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      SMTP_USE_SSL: ${SMTP_USE_SSL:-false}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - app_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/}
    container_name: ppa-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-20320}:80"
    networks:
      - app_net

volumes:
  postgres_data:

networks:
  app_net:
